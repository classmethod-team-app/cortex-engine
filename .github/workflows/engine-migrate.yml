name: エンジンマイグレーション（データスキーマ更新）

# エンジンの更新がデータ側（frontmatter・ディレクトリ構造・CLAUDE.md）の変更を要する場合に、
# 案件リポのデータを追随させる。案件リポのスタブから workflow_call で呼ばれる（夜間cron＋手動）。
#
# 仕組み:
#   - 案件リポの Cortex/Home.md frontmatter `engine.schema_version` と、
#     エンジンの migrations/ にある最大 to 番号を比較し、未適用分を順に実行する。
#   - autoApply: true のマイグレーションのみ自動実行して直コミットする。
#     autoApply: false（非可逆・既存レコード書き換え）が残っている場合は警告を出して止める
#     （PR起票による適用は将来拡張。現状は手動適用を案内する）。
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
jobs:
  migrate:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 未適用マイグレーションを実行
        run: node .cortex-engine/scripts/engine-migrate.mjs

      - name: 変更があればコミット＆push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし。スキップ"
            exit 0
          fi
          git commit -m "エンジンマイグレーションを適用（schema_version更新）"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "push成功"
              exit 0
            fi
            echo "push失敗。最新を取り込み再試行（$i/5）"
            git fetch origin ${GITHUB_REF_NAME} || true
            # 未ステージの生成差分をコミットに畳む（rebaseがunstaged変更で拒否されるのを防ぐ）
            git add -A
            git diff --cached --quiet || git commit --amend --no-edit
            # rebase。再生成ファイルの衝突は最新側(=こちら)を採用して自動解決する
            if ! git rebase origin/${GITHUB_REF_NAME}; then
              for f in $(git diff --name-only --diff-filter=U); do
                git checkout --theirs -- "$f" 2>/dev/null || true
                git add -- "$f" 2>/dev/null || git rm -- "$f" 2>/dev/null || true
              done
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
          done
          echo "::error::pushに5回失敗しました"; exit 1
