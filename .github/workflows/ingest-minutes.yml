name: 議事録 自動生成（文字起こし→議事録）

# 案件リポのスタブから workflow_call で呼ばれる。
# cortex-notetaker(Apps Script) が文字起こしを追加すると案件リポへ repository_dispatch → スタブが本ワークフローを呼ぶ。
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AWS_REGION: ap-northeast-1 # Claude を有効化したリージョン（東京）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 既存議事録の有無の照合に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）なら丸ごとスキップ（セットアップ途中の案件で毎晩failしない）
      - name: 前提チェック（Bedrockロールの有無）
        id: pre
        env:
          ROLE: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$ROLE" ]; then
            echo "::notice::AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）。議事録自動生成をスキップします。"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Git設定
        if: steps.pre.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: AWS認証（OIDC）
        if: steps.pre.outputs.run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # cortex-tools/infra の GithubActionsOidc が作成したロールARN
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Claude Code をインストール
        if: steps.pre.outputs.run == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: 議事録 自動生成（Claude / Bedrock）
        if: steps.pre.outputs.run == 'true'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1" # APIキーの代わりに Bedrock を使用
          ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6 # 東京・日本国内推論（Bedrockで該当モデルのアクセス有効化が必要）
        run: |
          PROMPT=$(cat <<'EOF'
          会議ディレクトリ（`ingest-config.json` があるディレクトリ。通常は 会議/ だが案件により MTG/ 等にカスタマイズされている）配下には、
          cortex-notetaker により自動取り込みされた会議の「文字起こし」が置かれています。
          まだ議事録が作られていない文字起こしを見つけ、議事録を生成してください。

          手順:
          - 会議ディレクトリ配下を走査し、文字起こしファイルのうち「対応する議事録がまだ無いもの」だけを対象にする。
            （同じ会議・日付の議事録が既にあるものはスキップ。毎晩走るため、未処理が無ければ通常状態です）
          - 各対象について、.cortex-engine/plugin/skills/create-minute/SKILL.md の様式に従って議事録を生成する。
          - 生成した議事録の frontmatter に、自動生成・人間レビュー前であることを示す `review: pending` を付与する
            （Human on the loop。人が確認したら外す運用）。
          - 文字起こし原本（Bronze）は編集・削除しない。議事録（Silver）を新規追加するだけにする。
          - .cortex-engine/ 配下（エンジン）は走査対象から除外し、変更・コミットもしない。
          - 変更があれば git commit までを行う（push は行わない）。
          - 対象が無ければ何もコミットせず終了する。
          EOF
          )
          # 無人実行（ephemeralなCIランナー）のため権限確認はスキップする
          claude -p "$PROMPT" --max-turns 40 --dangerously-skip-permissions

      - name: Push（競合時はrebaseで再試行）
        if: steps.pre.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Claude のコミットを確実に push するため、明示的にトークンで認証する
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -z "$(git log origin/${GITHUB_REF_NAME}..HEAD 2>/dev/null)" ]; then
            echo "コミットなし。pushをスキップ"
            exit 0
          fi
          for i in 1 2 3; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "push成功"
              exit 0
            fi
            echo "push失敗。rebaseして再試行（$i/3）"
            git pull --rebase origin ${GITHUB_REF_NAME}
          done
          echo "pushに3回失敗しました"
          exit 1
