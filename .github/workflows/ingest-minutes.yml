name: 議事録 自動生成（文字起こし→議事録）

# 案件リポのスタブから workflow_call で呼ばれる。
# cortex-notetaker(Apps Script) が文字起こしを追加すると案件リポへ repository_dispatch → スタブが本ワークフローを呼ぶ。
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
      aws_role_arn:
        description: "Bedrock用IAMロールARN。別org等で secrets: inherit が届かない場合にスタブから明示的に渡す（空なら secrets.AWS_ROLE_TO_ASSUME を使う）"
        required: false
        type: string
        default: ""
jobs:
  ingest:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 25
    env:
      AWS_REGION: ap-northeast-1 # Claude を有効化したリージョン（東京）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 既存議事録の有無の照合に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 案件のデータ版(schema_version)がエンジン最新より古い（未適用マイグレーション保留中）なら精製をスキップ
      - name: スキーマ版チェック
        id: schema
        run: |
          if node .cortex-engine/scripts/schema-current.mjs; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      # AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）なら丸ごとスキップ（セットアップ途中の案件で毎晩failしない）
      - name: 前提チェック（Bedrockロールの有無）
        id: pre
        env:
          ROLE: ${{ inputs.aws_role_arn != '' && inputs.aws_role_arn || secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          if [ -z "$ROLE" ]; then
            echo "::notice::AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）。議事録自動生成をスキップします。"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Git設定
        if: steps.pre.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 通知（後段）で「このrunで増えた議事録」を検出するための基準コミットを記録
      - name: 通知用の基準コミットを記録
        id: prehead
        if: steps.pre.outputs.run == 'true'
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: AWS認証（OIDC）
        if: steps.pre.outputs.run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # cortex-tools/infra の GithubActionsOidc が作成したロールARN
          role-to-assume: ${{ inputs.aws_role_arn != '' && inputs.aws_role_arn || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Claude Code をインストール
        if: steps.pre.outputs.run == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: 議事録 自動生成（Claude / Bedrock）
        if: steps.pre.outputs.run == 'true' && steps.schema.outputs.current == 'true'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1" # APIキーの代わりに Bedrock を使用
          ANTHROPIC_MODEL: global.anthropic.claude-sonnet-5 # Sonnet 5。jp.（日本国内推論）に未提供のため当面global.で運用し、jp.anthropic.claude-sonnet-5 が提供され次第そちらへ切り替える（Bedrockで該当モデルのアクセス有効化が必要）
        run: |
          PROMPT=$(cat <<'EOF'
          会議ディレクトリ（`ingest-config.json` があるディレクトリ。通常は 会議/ だが案件により MTG/ 等にカスタマイズされている）配下には、
          cortex-notetaker により自動取り込みされた会議の「文字起こし」が置かれています。
          まだ議事録が作られていない文字起こしを見つけ、議事録を生成してください。

          手順:
          - 会議ディレクトリ配下を走査し、文字起こしファイルのうち「対応する議事録がまだ無いもの」だけを対象にする。
            （同じ会議・日付の議事録が既にあるものはスキップ。毎晩走るため、未処理が無ければ通常状態です）
          - 各対象について、.cortex-engine/plugin/skills/create-minute/SKILL.md の様式に従って議事録を生成する。
            生成して終わりにせず、SKILL.md の「生成後の自己検証（第2パス）」セクションまで必ず実施する（課題キー実在・担当者の名簿突合・日付×曜日・ステータス規律・文字起こし突合。疑わしい箇所は自動修正せず ⚠️要確認 を付ける）。
          - 議事録に frontmatter は付けない（frontmatter は Gold 層 = Cortex/ 配下のみ）。代わりに、自動生成・
            人間レビュー前であることを示す一行「> ⚠️ この議事録はAIによる自動生成です（人間レビュー前）。内容を
            確認したらこの行を削除してください。」を本文の H1 直後に入れる（Human on the loop。人が確認したら
            その行を削除する運用）。
          - 文字起こし原本（Bronze）の中身は改変しない。ただし議事録と文字起こしは必ず同じフォルダに同居させること。
            既存の会議ディレクトリの階層構成（例: 会議/{フェーズ}/{定例名}/{YYYYMMDD}/ に議事録・文字起こし・元ファイルが同居）を確認し、
            投入フォームやbotがフラットな場所（例: 会議/{YYYYMMDD}-xxx.docx）に置いた文字起こし原本は、生成する議事録と同じ
            {YYYYMMDD}フォルダへ移動してから議事録を作る（create-minute/SKILL.md の配置規約に従う）。日付プレフィックスは除いてよい。
          - .cortex-engine/ 配下（エンジン）は走査対象から除外し、変更・コミットもしない。
          - 変更があれば git commit までを行う（push は行わない）。
          - 対象が無ければ何もコミットせず終了する。
          EOF
          )
          # 無人実行（ephemeralなCIランナー）のため権限確認はスキップする
          claude -p "$PROMPT" --max-turns 60 --dangerously-skip-permissions

      - name: Push（競合時はrebaseで再試行）
        if: steps.pre.outputs.run == 'true'
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成された議事録を Slack に通知しレビューを促す（品質ゲート。best-effort＝失敗しても job を落とさない）。
      # notify:true チャンネルへ投稿し、文字起こしに埋め込まれた organizer をメンションする。
      - name: 議事録レビュー依頼を通知（best-effort）
        if: steps.pre.outputs.run == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          PRE_HEAD: ${{ steps.prehead.outputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          [ -n "$PRE_HEAD" ] || exit 0
          # このrunで増えた議事録ファイルを検出（0件なら何もしない）
          NEW_MINUTES=$(git -c core.quotepath=false diff --name-only "$PRE_HEAD"..HEAD | grep '_minutes\.md$' || true)
          [ -n "$NEW_MINUTES" ] || { echo "::notice::新規議事録なし。通知しません。"; exit 0; }
          # 1ファイル=1通のループ（主催者はファイルごとに異なりうるため）。通知は best-effort。
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            dir=$(dirname "$f")
            # 表示名: ディレクトリ2段（定例名/日付）を人間可読に
            label=$(printf '%s' "$dir" | awk -F/ '{ if (NF>=2) print $(NF-1)" "$NF; else print $NF }')
            # GitHubリンク（パスをURLエンコード）
            enc=$(python3 -c 'import sys,urllib.parse; print("/".join(urllib.parse.quote(p) for p in sys.argv[1].split("/")))' "$f")
            link="https://github.com/${REPO}/blob/main/${enc}"
            # 主催者メール: 同じディレクトリ内のファイルから最初の organizer を拾う
            email=$(grep -rhoE 'cortex: organizer=[^ >-]+' "$dir" 2>/dev/null | head -n1 | sed 's/^cortex: organizer=//' || true)
            body=$(printf '📝 議事録が自動生成されました（AIレビュー前）\n%s → %s\n今晩のGold昇格前に内容の確認をお願いします（冒頭の⚠️行を削除するとレビュー済みの印になります）。' "$label" "$link")
            if [ -n "$email" ]; then
              printf '%s' "$body" | bash .cortex-engine/plugin/scripts/notify-slack.sh --mention-email "$email" || true
            else
              printf '%s' "$body" | bash .cortex-engine/plugin/scripts/notify-slack.sh || true
            fi
          done <<< "$NEW_MINUTES"
