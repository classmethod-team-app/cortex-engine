name: 共有資料 自動変換（ファイル→Markdown）

# 案件リポのスタブから workflow_call で呼ばれる。
# 投入フォーム(Intake Lambda)が資料ファイルを 共有資料/ に commit → material-ingested を dispatch → スタブが本ワークフローを呼ぶ。
# 変換は markitdown（uv/python）のみ。AWS/Bedrock は使わない。
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト/スキル等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
jobs:
  convert:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 既存 .md の有無の照合に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: uv をインストール（markitdown 変換スクリプト用）
        uses: astral-sh/setup-uv@v5

      - name: Git設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 共有資料の変換（markitdown）
        run: |
          # 共有資料/ 配下の未変換ファイル（対応形式）をmarkitdownでMD化。画像等は生のまま。
          uv run --no-project .cortex-engine/plugin/skills/sync-materials/scripts/convert.py 共有資料 --organize || echo "変換対象なし or 一部スキップ"
          git add 共有資料/
          if git diff --staged --quiet; then echo "変更なし"; else git commit -m "共有資料をMarkdownに変換（markitdown）"; fi

      - name: Push（競合時はrebaseで再試行）
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
