name: Backlog同期

# 案件リポのスタブから workflow_call で呼ばれる（トリガー・concurrency・permissions はスタブ側が持つ）
on:
  workflow_call:
    inputs:
      issue_key_filename:
        description: "Backlogミラーのファイル名を課題キーにする（長い日本語タイトルによるLinux 255バイト超を回避。案件でオプトイン）"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 同一リポ内でBacklogミラーへ書き込む全ワークフロー（cron同期・realtime・decision-log等）を
    # 1グループに直列化し、backlog-settings.json 等の再生成ファイルでのpush競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    # ジッター最大10分 + 同期 + リトライを考慮して引き上げ
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ジッター待機（同時刻バースト回避）
        if: github.event_name == 'schedule'
        run: |
          # BACKLOG_API_KEY を中央化（org secret）すると、同一Backlogスペースに同居する
          # 複数案件が同じキーで毎時:00に同時発火し、スペースのレート上限に同時に当たりうる。
          # 0〜600秒のrandom待機でバーストを分散する。手動実行(workflow_dispatch)では待たない。
          wait=$((RANDOM % 601))
          echo "同時刻バースト回避のため ${wait} 秒待機します"
          sleep "$wait"

      - name: Backlog同期
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}
        run: |
          # backlog-exporter自身も100req/15秒スロットルとky既定の429リトライ(Retry-After尊重)を持つが、
          # 課題一覧fetchの失敗は致命的(即終了)になるため、ジョブ全体の軽いリトライを保険として被せる。
          # update --force は冪等なので再実行しても安全。
          for attempt in 1 2 3; do
            if npx --yes backlog-exporter@latest update --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}; then
              exit 0
            fi
            echo "同期に失敗しました（試行 ${attempt}/3）。${attempt}分待って再試行します..." >&2
            sleep $((attempt * 60))
          done
          echo "3回試行しても同期に失敗しました" >&2
          exit 1

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 同期ミラーのルート（backlog-settings.json を持つディレクトリ）をステージする。
          # ディレクトリ名は案件でカスタマイズされ得る（例: 課題管理/ ではなく Backlog/）ためハードコードしない。
          for d in $(find . -name backlog-settings.json -not -path './node_modules/*' -not -path './.git/*' | xargs -n1 dirname | sort -u); do
            git add "$d"
          done
          if git diff --staged --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "Backlogデータを同期"
          if [ -z "$(git log origin/${GITHUB_REF_NAME}..HEAD 2>/dev/null)" ]; then
            echo "未pushコミットなし"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "push成功"
              exit 0
            fi
            echo "push失敗。最新を取り込み再試行（$i/5）"
            git fetch origin ${GITHUB_REF_NAME} || true
            # 未ステージの生成差分をコミットに畳む（rebaseがunstaged変更で拒否されるのを防ぐ）
            git add -A
            git diff --cached --quiet || git commit --amend --no-edit
            # rebase。同期ミラーの再生成ファイル(backlog-settings.json/backlog-update.log等)の衝突は
            # 最新側(=こちら)を採用して自動解決する（次回同期・cronでBacklogを正本に再整合するため安全）
            if ! git rebase origin/${GITHUB_REF_NAME}; then
              for f in $(git diff --name-only --diff-filter=U); do
                git checkout --theirs -- "$f" 2>/dev/null || true
                git add -- "$f" 2>/dev/null || git rm -- "$f" 2>/dev/null || true
              done
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            fi
          done
          echo "::error::pushに5回失敗しました"
          exit 1
