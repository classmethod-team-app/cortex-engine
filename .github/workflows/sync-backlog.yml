name: Backlog同期

# 案件リポのスタブから workflow_call で呼ばれる（トリガー・concurrency・permissions はスタブ側が持つ）
on:
  workflow_call:
    inputs:
      issue_key_filename:
        description: "Backlogミラーのファイル名を課題キーにする（長い日本語タイトルによるLinux 255バイト超を回避。案件でオプトイン）"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 同一リポ内でBacklogミラーへ書き込む全ワークフロー（cron同期・realtime・decision-log等）を
    # 1グループに直列化し、backlog-settings.json 等の再生成ファイルでのpush競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    # ジッター最大10分 + 同期 + リトライを考慮して引き上げ
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # backlog-exporter@1 が node>=22 を要求

      - name: ジッター待機（同時刻バースト回避）
        if: github.event_name == 'schedule'
        run: |
          # BACKLOG_API_KEY を中央化（org secret）すると、同一Backlogスペースに同居する
          # 複数案件が同じキーで毎時:00に同時発火し、スペースのレート上限に同時に当たりうる。
          # 0〜600秒のrandom待機でバーストを分散する。手動実行(workflow_dispatch)では待たない。
          wait=$((RANDOM % 601))
          echo "同時刻バースト回避のため ${wait} 秒待機します"
          sleep "$wait"

      - name: Backlog同期
        id: sync
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}
        run: |
          # 初回（backlog-settings.json が無い新規リポ）は全量取得 all、以降は増分 update。
          #   update は既存の backlog-settings.json（lastUpdated）を前提にするため、
          #   初回にこれが無いと「変更なし」で何も入らない（新規セットアップの落とし穴）。
          # all/update とも冪等なので、下のリトライで再実行しても安全。
          run_sync() {
            if find . -name backlog-settings.json -not -path './.git/*' | grep -q .; then
              npx --yes backlog-exporter@1 update --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
            else
              echo "backlog-settings.json が無いため初回全量取得(all)を実行します"
              npx --yes backlog-exporter@1 all --domain "$DOMAIN" --projectIdOrKey "$PROJECT_KEY" --output ./課題管理
            fi
          }
          # backlog-exporter自身も100req/15秒のRateLimiterを持つが、
          # 課題一覧fetchの失敗は致命的(即終了)になるため、ジョブ全体の軽いリトライを保険として被せる。
          for attempt in 1 2 3; do
            if run_sync; then
              # Backlog上で削除・移動された課題・ドキュメント・Wikiのローカル残骸を掃除してミラーを一致させる。
              # 一覧取得に失敗した場合は何も削除しない安全設計のため、失敗しても同期全体は失敗させない（ログのみ）。
              npx --yes backlog-exporter@1 prune --force || echo "::warning::pruneに失敗（同期は成功扱い。次回に再試行）"
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "同期に失敗しました（試行 ${attempt}/3）。${attempt}分待って再試行します..." >&2
            sleep $((attempt * 60))
          done
          # 3回失敗しても、ここで job を止めない。exporter は課題→Wiki→ドキュメントの順に
          # 逐次ディスクへ書くため、途中の 403 等で落ちても「取得済み分」は working tree に残っている。
          # それを次ステップで commit/push し、取得済みの成果を捨てないようにする（未取得分は
          # 該当フォルダの lastUpdated が未前進のため次回 update で再取得＝自己回復）。
          # prune は部分同期での誤削除を避けるためスキップ（成功時のみ実行済み）。最終ステップで run を失敗にする。
          echo "::warning::Backlog同期が3回失敗（403等で一部リソース未取得）。取得済み分だけコミットして続行します" >&2
          echo "ok=false" >> "$GITHUB_OUTPUT"

      - name: 変更をコミット・プッシュ
        if: ${{ !cancelled() }} # 同期が途中失敗しても取得済み分はコミットする
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 同期ミラーのルート（backlog-settings.json を持つディレクトリ）をステージする。
          # ディレクトリ名は案件でカスタマイズされ得る（例: 課題管理/ ではなく Backlog/）ためハードコードしない。
          for d in $(find . -name backlog-settings.json -not -path './node_modules/*' -not -path './.git/*' | xargs -n1 dirname | sort -u); do
            git add "$d"
          done
          if git diff --staged --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "Backlogデータを同期"

      - name: 堅牢push（未ステージ畳み込み・衝突自動解決・リトライ）
        if: ${{ !cancelled() }} # 取得済み分は途中失敗でも push する
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 同期が途中失敗なら run を失敗にする（取得済み分は push 済み）
        if: steps.sync.outputs.ok != 'true'
        run: |
          echo "::error::Backlog同期が途中で失敗しました。取得済み分はコミット/push済みですが、一部リソース（403等）が未取得です。次回の同期で再取得を試みます。恒常的に続く場合は APIキーの権限（そのユーザーが該当ドキュメント/Wikiを閲覧できるか）と backlog-exporter の 403 ハンドリングを確認してください。"
          exit 1
