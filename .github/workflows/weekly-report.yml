name: 週次レポート生成

# 案件リポのスタブから workflow_call で呼ばれる（トリガー・concurrency・permissions はスタブ側が持つ）
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
      aws_role_arn:
        description: "Bedrock用IAMロールARN。別org等で secrets: inherit が届かない場合にスタブから明示的に渡す（空なら secrets.AWS_ROLE_TO_ASSUME を使う）"
        required: false
        type: string
        default: ""
      since:
        description: "増分起点をISO8601で上書き（バックフィル用。空なら前回成功以降）"
        required: false
        type: string
        default: ""

jobs:
  report:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 20
    env:
      AWS_REGION: ap-northeast-1 # Claude を有効化したリージョン（東京）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 「直近7日」の差分判定に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 案件のデータ版(schema_version)がエンジン最新より古い（未適用マイグレーション保留中）なら精製をスキップ
      - name: スキーマ版チェック
        id: schema
        run: |
          if node .cortex-engine/scripts/schema-current.mjs; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Git設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: AWS認証（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # cortex-tools/infra の GithubActionsOidc が作成したロール（decision-logと共用）
          role-to-assume: ${{ inputs.aws_role_arn != '' && inputs.aws_role_arn || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Claude Code をインストール
        run: npm i -g @anthropic-ai/claude-code

      # 増分起点(SINCE)＝このワークフローの直近成功run。週次が失敗した週も、次の成功時にSINCEが遡るので
      # 未生成の週をまとめて生成できる（巻き取り）。
      # 注意: --workflow は案件リポ側スタブのファイル名。スタブは weekly-report.yml の名前を変えないこと。
      - name: 増分窓の起点(SINCE)を算出（前回成功以降・14日キャップ）
        id: win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE_SINCE: ${{ inputs.since }}
        run: |
          CAP=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          if [ -n "$OVERRIDE_SINCE" ]; then
            SINCE="$OVERRIDE_SINCE"
            echo "::notice::SINCE を手動上書き（バックフィル）: $SINCE"
          else
            LAST=$(gh run list --workflow=weekly-report.yml --status success --limit 1 --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
            if [ -z "$LAST" ]; then SINCE="$CAP"; else SINCE="$LAST"; fi
          fi
          if [[ "$SINCE" < "$CAP" ]]; then
            echo "::warning::増分起点 $SINCE が14日上限より古いため $CAP に丸めます（未生成週はsince入力で個別バックフィルを）"
            SINCE="$CAP"
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "増分起点 SINCE=$SINCE"

      - name: 週次レポート生成（Claude / Bedrock）
        if: steps.schema.outputs.current == 'true'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1" # APIキーの代わりに Bedrock を使用
          ANTHROPIC_MODEL: global.anthropic.claude-sonnet-5 # Sonnet 5。jp.（日本国内推論）に未提供のため当面global.で運用し、jp.anthropic.claude-sonnet-5 が提供され次第そちらへ切り替える（Bedrockで該当モデルのアクセス有効化が必要）
          SINCE: ${{ steps.win.outputs.since }} # 増分起点（前回成功以降）。未生成週の判定に使う
        run: |
          PROMPT=$(cat <<'EOF'
          .cortex-engine/plugin/skills/weekly-report/SKILL.md の指示に従い、
          単一案件の週次レポートを標準フォーマットで Cortex/レポート/records/YYYYMMDD.md（YYYYMMDD=その週の期間末）に生成してください。

          対象期間（失敗週の巻き取り対応）:
          - 通常は実行日を期間末とする直近7日。
          - さらに環境変数 SINCE 以降（前回成功以降）に、まだレポートファイルが無い週があれば、その未生成週もそれぞれ生成すること。各週は期間末日付のファイル名で1ファイルずつ。
          - 既に同名ファイルがある週は再生成しない（上書きしない＝レビュー済みを壊さない）。未生成の週だけ作る。

          注意:
          - frontmatter と見出し構造は Cortex/レポート/template.md の雛形どおり固定すること（独自見出しを足さない）。
          - 差分に根拠が無い項目は「なし」とし、推測で埋めないこと。
          - .cortex-engine/ 配下（エンジン）は集計対象から除外し、変更・コミットもしないこと。
          - 生成後、git commit までを行うこと（push は行わない）。
          EOF
          )
          # 無人実行（ephemeralなCIランナー）のため権限確認はスキップする
          claude -p "$PROMPT" --max-turns 80 --dangerously-skip-permissions

      # 生成物がオントロジー規約に違反している場合、ここで止める（壊れたコミットをpushしない）
      - name: Cortexのスキーマ検証
        run: node .cortex-engine/plugin/scripts/validate-cortex.mjs

      - name: Push（競合時はrebaseで再試行）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # スキルが未コミットで残した生成物があればコミット（スキルが既に commit 済みなら何もしない）
          git add Cortex/レポート/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "週次レポートを自動生成"
          fi

      - name: 堅牢push（未ステージ畳み込み・衝突自動解決・リトライ）
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
