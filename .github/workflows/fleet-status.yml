name: セットアップ状況の自己チェック

# 案件リポ自身のセットアップ充足度を算出し、`fleet-status.json` に書き出してコミットする。
# 巡回エージェント／フリート管理は各案件のこのファイルを読んで集約する。
# 案件リポのスタブから workflow_call で呼ばれる。
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
jobs:
  status:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 失敗時の原因切り分け用（トークン未達か・トークンのアクセス権不足かを明確にする）
      - name: エンジン取得の事前確認（トークン診断）
        env:
          T: ${{ secrets.ENGINE_REPO_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::ENGINE_REPO_TOKEN がワークフローに届いていません（org secret の可視性、スタブの secrets: inherit を確認）"
            exit 1
          fi
          echo "ENGINE_REPO_TOKEN: 届いています（長さ ${#T}）"
          # 重要: checkout済みリポの中で実行すると actions/checkout が仕込んだ extraheader
          # （GITHUB_TOKEN。cortex-engineは見えない）がURL認証より優先され、正しいトークンでも404になる。
          # リポ外（一時ディレクトリ）で実行して汚染を避ける。
          cd "$(mktemp -d)"
          if git ls-remote "https://x-access-token:${T}@github.com/classmethod-team-app/cortex-engine" HEAD >/dev/null 2>&1; then
            echo "cortex-engine へのアクセス: OK"
          else
            echo "::error::トークンで cortex-engine にアクセスできません。PAT の Resource owner（classmethod-team-app）／Repository access（cortex-engine を選択）／Permissions（Contents: Read-only）／org の承認状態（Pending になっていないか）を確認してください"
            exit 1
          fi

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: セットアップ状況を生成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # gh run list 用
          # シークレットの「有無」だけを渡す（値は渡さない・管理者権限も不要）
          HAS_AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
          HAS_BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY != '' }}
          HAS_BACKLOG_DOMAIN: ${{ secrets.BACKLOG_DOMAIN != '' }}
          HAS_BACKLOG_PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY != '' }}
          HAS_FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN != '' }}
          HAS_ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN != '' }}
          # エンジンのバージョン（本ワークフローのコミットSHA）を報告に含める
          ENGINE_VERSION: ${{ github.job_workflow_sha }}
        run: node .cortex-engine/scripts/fleet-status.mjs

      - name: 変更があればコミット＆push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 新規ファイル（未追跡）も検知するため、先にstageしてから差分判定する
          git add fleet-status.json
          if git diff --staged --quiet; then
            echo "変更なし。スキップ"
            exit 0
          fi
          git commit -m "fleet-status: セットアップ状況を更新"

      - name: 堅牢push（未ステージ畳み込み・衝突自動解決・リトライ）
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
