name: Backlogリアルタイム同期（webhook受信）

# cortex-tools の Backlog Webhook 基盤（受信Lambda→DynamoDBバッファ→1分ディスパッチャ）から
# 案件リポへ repository_dispatch → スタブが本ワークフローを呼ぶ。
# 1分ミニバッチで集約されたイベントを受けるため、client_payload は「複数キーの配列」を運ぶ:
#   issueKeys: ["PJ-1","PJ-2"] / wikiIds: ["12","13"] / documentIds: ["019f..."]
#   issuesFull|wikisFull|documentsFull: true（スコープ全体差分）
# 旧形式（単一キー: kind/issueKey/wikiId・full）も後方互換で受ける。
# github.event.client_payload は呼び出し元（案件リポ）のイベントがそのまま見える。
on:
  workflow_call:
    inputs:
      issue_key_filename:
        description: "Backlogミラーのファイル名を課題キーにする（長い日本語タイトルによるLinux 255バイト超を回避。案件でオプトイン）"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 同一リポ内でBacklogミラーへ書き込む全ワークフロー（cron同期・realtime・decision-log等）を
    # 1グループに直列化し、backlog-settings.json 等の再生成ファイルでのpush競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # backlog-exporter@1 が node>=22 を要求

      - name: 対象（課題／Wiki・複数キー可）をまとめて同期
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}
          # client_payload はシェルへ直接展開せず env 経由で受ける（スクリプトインジェクション対策）。
          # 新形式（1分ミニバッチ）: 課題キー／Wiki ID を配列で受け、カンマ結合して1回で同期する。
          ISSUE_KEYS: ${{ join(github.event.client_payload.issueKeys, ',') }}
          WIKI_IDS: ${{ join(github.event.client_payload.wikiIds, ',') }}
          DOCUMENT_IDS: ${{ join(github.event.client_payload.documentIds, ',') }}
          ISSUES_FULL: ${{ github.event.client_payload.issuesFull }}
          WIKIS_FULL: ${{ github.event.client_payload.wikisFull }}
          DOCUMENTS_FULL: ${{ github.event.client_payload.documentsFull }}
          # 旧形式（単一イベント）後方互換: kind と単一キー・全体差分フラグ。
          KIND: ${{ github.event.client_payload.kind }}
          ISSUE_KEY: ${{ github.event.client_payload.issueKey }}
          WIKI_ID: ${{ github.event.client_payload.wikiId }}
          FULL: ${{ github.event.client_payload.full }}
          ISSUE_KEY_FILENAME: ${{ inputs.issue_key_filename }}
        run: |
          set -euo pipefail
          # v1.0.0 から update がキー指定（--issueIdOrKey / --wikiId / --documentId）とカンマ区切りの複数指定に対応した。
          # webhook payload のキーで該当項目だけを再取得し、APIリクエストを最小化する。
          # 単体/複数指定時は lastUpdated が更新されないため、夜間の増分全体同期（sync-backlog）の窓は壊れない。
          # キーが無い/番兵の場合はスコープ増分（--issuesOnly / --wikisOnly / --documentsOnly）にフォールバックする。
          FN_FLAG=""
          [ "$ISSUE_KEY_FILENAME" = "true" ] && FN_FLAG="--issueKeyFileName"

          # 課題スコープの決定（全体差分フラグ > 複数キー > 旧単一キー）
          run_issue=false
          issue_full=false
          issue_arg=""
          if [ "$ISSUES_FULL" = "true" ] || [ "$FULL" = "true" ]; then
            run_issue=true; issue_full=true
          elif [ -n "$ISSUE_KEYS" ]; then
            run_issue=true; issue_arg="--issueIdOrKey $ISSUE_KEYS"
          elif [ "$KIND" = "issue" ]; then
            run_issue=true
            if [ -n "$ISSUE_KEY" ]; then issue_arg="--issueIdOrKey $ISSUE_KEY"; else issue_full=true; fi
          fi

          # Wikiスコープの決定（同上）
          run_wiki=false
          wiki_full=false
          wiki_arg=""
          if [ "$WIKIS_FULL" = "true" ] || [ "$FULL" = "true" ]; then
            run_wiki=true; wiki_full=true
          elif [ -n "$WIKI_IDS" ]; then
            run_wiki=true; wiki_arg="--wikiId $WIKI_IDS"
          elif [ "$KIND" = "wiki" ]; then
            run_wiki=true
            if [ -n "$WIKI_ID" ]; then wiki_arg="--wikiId $WIKI_ID"; else wiki_full=true; fi
          fi

          # ドキュメントスコープの決定（全体差分フラグ > 複数ID）。ドキュメントはwebhook起点が新しく旧単一形式は無い。
          run_doc=false
          doc_full=false
          doc_arg=""
          if [ "$DOCUMENTS_FULL" = "true" ] || [ "$FULL" = "true" ]; then
            run_doc=true; doc_full=true
          elif [ -n "$DOCUMENT_IDS" ]; then
            run_doc=true; doc_arg="--documentId $DOCUMENT_IDS"
          fi

          if [ "$run_issue" = false ] && [ "$run_wiki" = false ] && [ "$run_doc" = false ]; then
            echo "::warning::同期対象がpayloadに無い（kind=$KIND）。スキップ"
            exit 0
          fi

          if [ "$run_issue" = true ]; then
            if [ "$issue_full" = true ]; then
              echo "課題を増分全体同期（--issuesOnly）"
              npx --yes backlog-exporter@1 update --issuesOnly --force $FN_FLAG
            else
              echo "課題を同期（$ISSUE_KEYS$ISSUE_KEY）"
              npx --yes backlog-exporter@1 update $issue_arg --force $FN_FLAG
            fi
          fi
          if [ "$run_wiki" = true ]; then
            if [ "$wiki_full" = true ]; then
              echo "Wikiを増分全体同期（--wikisOnly）"
              npx --yes backlog-exporter@1 update --wikisOnly --force $FN_FLAG
            else
              echo "Wikiを同期（wiki $WIKI_IDS$WIKI_ID）"
              npx --yes backlog-exporter@1 update $wiki_arg --force $FN_FLAG
            fi
          fi
          if [ "$run_doc" = true ]; then
            if [ "$doc_full" = true ]; then
              echo "ドキュメントを増分全体同期（--documentsOnly）"
              npx --yes backlog-exporter@1 update --documentsOnly --force $FN_FLAG
            else
              echo "ドキュメントを同期（doc $DOCUMENT_IDS）"
              npx --yes backlog-exporter@1 update $doc_arg --force $FN_FLAG
            fi
          fi

          # コミットメッセージ用のラベルを次ステップへ引き渡す（同期したスコープのみを " / " で連結）。
          labels=""
          add_label() { [ -n "$1" ] && labels="${labels:+$labels / }$1"; }
          if [ "$run_issue" = true ]; then
            if [ "$issue_full" = true ]; then add_label "issues全体"; else add_label "issues:${ISSUE_KEYS}${ISSUE_KEY}"; fi
          fi
          if [ "$run_wiki" = true ]; then
            if [ "$wiki_full" = true ]; then add_label "wikis全体"; else add_label "wikis:${WIKI_IDS}${WIKI_ID}"; fi
          fi
          if [ "$run_doc" = true ]; then
            if [ "$doc_full" = true ]; then add_label "docs全体"; else add_label "docs:${DOCUMENT_IDS}"; fi
          fi
          echo "SYNC_LABEL=${labels}" >> "$GITHUB_ENV"

      - name: コミット（未pushコミット判定）
        env:
          # SYNC_LABEL は前ステップが生成した安全な要約（client_payload の生値は展開しない）。
          SYNC_LABEL: ${{ env.SYNC_LABEL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 同期ミラーのルート（backlog-settings.json を持つディレクトリ）をステージする。
          # ディレクトリ名は案件でカスタマイズされ得る（例: 課題管理/ ではなく Backlog/）ためハードコードしない。
          for d in $(find . -name backlog-settings.json -not -path './node_modules/*' -not -path './.git/*' | xargs -n1 dirname | sort -u); do
            git add "$d"
          done
          if git diff --staged --quiet; then
            echo "変更なし。スキップ"
            exit 0
          fi
          git commit -m "Backlogをリアルタイム同期（${SYNC_LABEL:-1分バッチ}）"

      - name: 堅牢push（未ステージ畳み込み・衝突自動解決・リトライ）
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
