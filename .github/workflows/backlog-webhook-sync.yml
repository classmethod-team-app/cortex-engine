name: Backlogリアルタイム同期（webhook受信）

# cortex-tools の Backlog Webhook Lambda から案件リポへ repository_dispatch → スタブが本ワークフローを呼ぶ。
# github.event.client_payload は呼び出し元（案件リポ）のイベントがそのまま見える。
# ドキュメントは Backlog webhook 非対応のため対象外（cron側で同期継続）。
on:
  workflow_call:
    inputs:
      issue_key_filename:
        description: "Backlogミラーのファイル名を課題キーにする（長い日本語タイトルによるLinux 255バイト超を回避。案件でオプトイン）"
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 同一リポ内でBacklogミラーへ書き込む全ワークフロー（cron同期・realtime・decision-log等）を
    # 1グループに直列化し、backlog-settings.json 等の再生成ファイルでのpush競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 対象（課題 or Wiki）を単体同期
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}
          KIND: ${{ github.event.client_payload.kind }}
          ISSUE_KEY: ${{ github.event.client_payload.issueKey }}
          WIKI_ID: ${{ github.event.client_payload.wikiId }}
        run: |
          # v1.0.0 から update がキー単体指定（--issueIdOrKey / --wikiId）に対応した。
          # webhook payload のキーで該当項目だけを再取得し、APIリクエストを最小化する。
          # 単体指定時は lastUpdated が更新されないため、夜間の増分全体同期（sync-backlog）の窓は壊れない。
          # キーが payload に無い場合は従来どおりスコープ増分（--issuesOnly / --wikisOnly）にフォールバックする。
          if [ "$KIND" = "issue" ]; then
            if [ -n "$ISSUE_KEY" ]; then
              echo "課題を単体同期（$ISSUE_KEY）"
              npx --yes backlog-exporter@1 update --issueIdOrKey "$ISSUE_KEY" --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
            else
              echo "課題キーがpayloadに無いため増分同期にフォールバック"
              npx --yes backlog-exporter@1 update --issuesOnly --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
            fi
          elif [ "$KIND" = "wiki" ]; then
            if [ -n "$WIKI_ID" ]; then
              echo "Wikiを単体同期（wiki $WIKI_ID）"
              npx --yes backlog-exporter@1 update --wikiId "$WIKI_ID" --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
            else
              echo "Wiki IDがpayloadに無いため増分同期にフォールバック"
              npx --yes backlog-exporter@1 update --wikisOnly --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
            fi
          else
            echo "::warning::未対応の client_payload（kind=$KIND）。スキップ"
            exit 0
          fi

      - name: コミット・プッシュ（未pushコミット判定・rebase再試行）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # client_payload はシェルへ直接展開しない（スクリプトインジェクション対策）
          KIND: ${{ github.event.client_payload.kind }}
          ISSUE_KEY: ${{ github.event.client_payload.issueKey }}
          WIKI_ID: ${{ github.event.client_payload.wikiId }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 同期ミラーのルート（backlog-settings.json を持つディレクトリ）をステージする。
          # ディレクトリ名は案件でカスタマイズされ得る（例: 課題管理/ ではなく Backlog/）ためハードコードしない。
          for d in $(find . -name backlog-settings.json -not -path './node_modules/*' -not -path './.git/*' | xargs -n1 dirname | sort -u); do
            git add "$d"
          done
          if git diff --staged --quiet; then
            echo "変更なし。スキップ"
            exit 0
          fi
          git commit -m "Backlogをリアルタイム同期（${KIND}: ${ISSUE_KEY}${WIKI_ID}）"

      - name: 堅牢push（未ステージ畳み込み・衝突自動解決・リトライ）
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
