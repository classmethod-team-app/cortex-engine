name: Gold昇格（Decision・用語集・メンバー）自動更新

# 案件リポのスタブから workflow_call で呼ばれる（トリガー・concurrency・permissions はスタブ側が持つ）
# 夜間Gold昇格の統合版。1セッションでソースを1回読み、決定・用語・メンバーdraftを書く（旧 update-decision-log / update-glossary を統合）
on:
  workflow_call:
    inputs:
      engine_ref:
        description: "エンジン（スクリプト等）のcheckout ref。スタブのチャンネルと揃える（stable=v1 / canary=main）"
        required: false
        type: string
        default: "v1"
      aws_role_arn:
        description: "Bedrock用IAMロールARN。別org等で secrets: inherit が届かない場合にスタブから明示的に渡す（空なら secrets.AWS_ROLE_TO_ASSUME を使う）"
        required: false
        type: string
        default: ""
      issue_key_filename:
        description: "Backlogミラーのファイル名を課題キーにする（長い日本語タイトルによるLinux 255バイト超を回避。案件でオプトイン）"
        required: false
        type: boolean
        default: false
      since:
        description: "増分起点をISO8601で上書き（バックフィル用。空なら前回成功以降）"
        required: false
        type: string
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    # 同一リポ内でmainへ書き込む同期系ワークフローと直列化し、push競合を構造的に減らす。
    concurrency:
      group: cortex-repo-write-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 20
    env:
      AWS_REGION: ap-northeast-1 # Claude を有効化したリージョン（東京）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 増分判定（git log --since）に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha || inputs.engine_ref }}
          path: .cortex-engine
          # private エンジンの checkout には読み取りトークンが必要（org secret）。
          # エンジンが public/内部公開なら github.token でも通るためフォールバックする。
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # backlog-exporter@1 が node>=22 を要求

      # 案件のデータ版(schema_version)がエンジン最新より古い（未適用マイグレーション保留中）なら精製をスキップ
      - name: スキーマ版チェック
        id: schema
        run: |
          if node .cortex-engine/scripts/schema-current.mjs; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
          fi

      # 必要なシークレットの有無を判定する。
      # - AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）なら Gold昇格自体をスキップ（セットアップ途中の案件で毎晩failしない）
      # - Backlog のシークレットが揃っていなければ Backlog同期だけスキップし、git差分（議事録等）からは更新する
      - name: 前提チェック（シークレットの有無）
        id: pre
        env:
          ROLE: ${{ inputs.aws_role_arn != '' && inputs.aws_role_arn || secrets.AWS_ROLE_TO_ASSUME }}
          BK_KEY: ${{ secrets.BACKLOG_API_KEY }}
          BK_DOM: ${{ secrets.BACKLOG_DOMAIN }}
          BK_PRJ: ${{ secrets.BACKLOG_PROJECT_KEY }}
        run: |
          if [ -z "$ROLE" ]; then
            echo "::notice::AWS_ROLE_TO_ASSUME 未設定（Bedrock未設定）。Gold昇格をスキップします。"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$BK_KEY" ] && [ -n "$BK_DOM" ] && [ -n "$BK_PRJ" ]; then
            echo "backlog=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Backlog シークレット未設定。Backlog同期をスキップし git差分からのみ更新します。"
            echo "backlog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Backlog同期
        if: steps.pre.outputs.run == 'true' && steps.pre.outputs.backlog == 'true'
        run: npx --yes backlog-exporter@1 update --force ${{ inputs.issue_key_filename && '--issueKeyFileName' || '' }}
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}

      # 増分の起点(SINCE)を「このワークフローの直近成功run」に置く。
      # 失敗runは成功扱いされないので、連続失敗しても次の成功実行で失敗分まで窓が自動で遡る（取りこぼしの巻き取り）。
      # 固定25h窓だと連続失敗で25hを超えた分が永久に漏れるため、その対策。
      # 注意: --workflow は案件リポ側スタブのファイル名。スタブは update-gold.yml の名前を変えないこと。
      # 移行初回対策: このワークフローの成功runがまだ無い（統合直後）場合は、旧 update-decision-log.yml の
      #   直近成功にフォールバックする（14日再走査を避けるため。用語集側は決定と同じソースを見るので decision-log で十分）。
      - name: 増分窓の起点(SINCE)を算出（前回成功以降・14日キャップ）
        id: win
        if: steps.pre.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE_SINCE: ${{ inputs.since }}
        run: |
          CAP=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          if [ -n "$OVERRIDE_SINCE" ]; then
            SINCE="$OVERRIDE_SINCE"
            echo "::notice::SINCE を手動上書き（バックフィル）: $SINCE"
          else
            LAST=$(gh run list --workflow=update-gold.yml --status success --limit 1 --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
            if [ -z "$LAST" ]; then
              # 統合直後でこのワークフローの成功runがまだ無い場合、旧ワークフローの直近成功に遡る
              LAST=$(gh run list --workflow=update-decision-log.yml --status success --limit 1 --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
            fi
            if [ -z "$LAST" ]; then SINCE="$CAP"; else SINCE="$LAST"; fi
          fi
          # 14日より古い起点は丸める（巨大窓によるmax-turns暴走を防ぐ。丸めた場合は未処理が残りうるので警告）
          if [[ "$SINCE" < "$CAP" ]]; then
            echo "::warning::増分起点 $SINCE が14日上限より古いため $CAP に丸めます（未処理分はsince入力で個別バックフィルを）"
            SINCE="$CAP"
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "増分起点 SINCE=$SINCE"

      # ソース差分が無い夜はAI実行（Bedrock課金・Claudeインストール）を丸ごとスキップする。
      # 判定はスキルのステップ1と同一スクリプト（changed-sources.sh）で行い、二重定義を避ける。
      # ゲートはBacklog同期の後に置く（同期が持ち込む未コミット変更も検査対象に含めるため）。
      # 差分ゲート: リポ内差分(changed-sources.sh)に加えて、Cortex/external-sources.json に
      # 登録された外部ソース(GitHub Issues/Discussions)の活動(external-sources.sh)も見る。
      # どちらかが非空なら changed=true（リポが静かでも外部に動きがあれば夜間精製を走らせる）。
      # 差分ゼロ最適化は「リポも外部も動きなし」の夜だけスキップ、を維持する。
      # external-sources.sh は権限エラー等を「活動なし」として扱うため、権限不備で毎晩空振りAI実行にはならない。
      - name: 差分ゲート（対象ソースが無ければAI実行をスキップ）
        id: gate
        if: steps.pre.outputs.run == 'true'
        env:
          SINCE: ${{ steps.win.outputs.since }}
          GH_TOKEN: ${{ secrets.EXTERNAL_SOURCES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(bash .cortex-engine/plugin/scripts/changed-sources.sh "$SINCE" "Cortex/")
          EXT=$(bash .cortex-engine/plugin/scripts/external-sources.sh "$SINCE")
          if [ -n "$CHANGED" ] || [ -n "$EXT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            if [ -n "$CHANGED" ]; then echo "対象ソース差分:"; echo "$CHANGED"; fi
            if [ -n "$EXT" ]; then echo "外部ソースに活動あり"; fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::前回成功以降の対象ソース差分・外部ソース活動なし。AI実行をスキップします。"
          fi

      - name: Git設定
        if: steps.pre.outputs.run == 'true' && steps.gate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: AWS認証（OIDC）
        if: steps.pre.outputs.run == 'true' && steps.gate.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # cortex-tools/infra の GithubActionsOidc が作成したロールARN
          role-to-assume: ${{ inputs.aws_role_arn != '' && inputs.aws_role_arn || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Claude Code をインストール
        if: steps.pre.outputs.run == 'true' && steps.gate.outputs.changed == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: Gold昇格自動更新（Claude / Bedrock）
        if: steps.pre.outputs.run == 'true' && steps.schema.outputs.current == 'true' && steps.gate.outputs.changed == 'true'
        env:
          CLAUDE_CODE_USE_BEDROCK: "1" # APIキーの代わりに Bedrock を使用
          ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6 # 東京・日本国内推論（Bedrockで該当モデルのアクセス有効化が必要）
          SINCE: ${{ steps.win.outputs.since }} # 増分起点（前回成功以降）。スキルの git log --since に渡す
          GH_TOKEN: ${{ secrets.EXTERNAL_SOURCES_TOKEN || secrets.GITHUB_TOKEN }} # スキルが external-sources.sh で外部ソース(Issues/Discussions)を取得するため
        run: |
          PROMPT=$(cat <<'EOF'
          .cortex-engine/plugin/skills/update-gold-auto/SKILL.md の指示に従い、
          前回実行以降に追加・更新されたコンテキスト（その日の議事録・課題等）から
          Gold層（Decisions・用語集・メンバーdraft）への昇格を1セッションで行ってください。
          ソースは1回だけ読み、その読みを決定・用語・メンバーの各フェーズで共有してください。

          注意:
          - 増分方式です。フル走査せず、環境変数 SINCE 以降（前回成功以降）に追加・更新されたソースだけを対象にしてください。git log は --since="$SINCE" を使うこと（SINCEが空なら約25時間がデフォルト）。
          - Backlog同期は既にワークフロー側で実行済みなのでスキップしてください。
          - フェーズごと（決定→用語→メンバー）に、対象ディレクトリだけを git add して逐次コミットしてください（push は行わない）。
          - Cortex/ 配下・.cortex-engine/ 配下（エンジン）は抽出源から除外してください（自己参照防止・エンジン不変更）。ただし本セッションの Phase A で自分が作成した Decision を用語フェーズの抽出源に含めるのは例外です（スキルの指示どおり）。
          - 昇格すべき候補が無ければ何もコミットせず終了してください（毎晩走るため、これは通常の状態です）。
          EOF
          )
          # 無人実行（ephemeralなCIランナー）のため権限確認はスキップする
          # 決定・用語・メンバーの3フェーズを1セッションで回すため、単発の60から余裕を見て80に増やす
          claude -p "$PROMPT" --max-turns 80 --dangerously-skip-permissions

      # 生成物がオントロジー規約に違反している場合、ここで止める（壊れたコミットをpushしない）
      # 増分窓が約25時間あるため、生成の揺らぎによる違反は翌晩のリトライで回復する
      - name: Cortexのスキーマ検証
        if: steps.pre.outputs.run == 'true' && steps.gate.outputs.changed == 'true'
        run: node .cortex-engine/plugin/scripts/validate-cortex.mjs

      - name: Push（競合時はrebaseで再試行）
        if: steps.pre.outputs.run == 'true' && steps.gate.outputs.changed == 'true'
        uses: classmethod-team-app/cortex-engine/.github/actions/robust-push@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
