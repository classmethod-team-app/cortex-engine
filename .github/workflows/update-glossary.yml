name: 用語集自動更新

# 案件リポのスタブから workflow_call で呼ばれる（トリガー・concurrency・permissions はスタブ側が持つ）
on:
  workflow_call:
    inputs:
      since:
        description: "増分起点をISO8601で上書き（バックフィル用。空なら前回成功以降）"
        required: false
        type: string
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ap-northeast-1 # Claude を有効化したリージョン（東京）

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 増分判定（git log --since）に履歴が必要

      - name: エンジンをチェックアウト（このワークフローと同一バージョン）
        uses: actions/checkout@v4
        with:
          repository: classmethod-team-app/cortex-engine
          ref: ${{ github.job_workflow_sha }}
          path: .cortex-engine
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: エンジンをGit管理対象外にする
        run: echo ".cortex-engine/" >> .git/info/exclude

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backlog同期
        run: pnpm dlx backlog-exporter@latest update --force
        env:
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          PROJECT_KEY: ${{ secrets.BACKLOG_PROJECT_KEY }}

      - name: Git設定
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: AWS認証（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Claude Code をインストール
        run: npm i -g @anthropic-ai/claude-code

      # 増分起点(SINCE)＝このワークフローの直近成功run。失敗が続いても次の成功で失敗分まで遡る（巻き取り）。
      # 注意: --workflow は案件リポ側スタブのファイル名。スタブは update-glossary.yml の名前を変えないこと。
      - name: 増分窓の起点(SINCE)を算出（前回成功以降・14日キャップ）
        id: win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE_SINCE: ${{ inputs.since }}
        run: |
          CAP=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)
          if [ -n "$OVERRIDE_SINCE" ]; then
            SINCE="$OVERRIDE_SINCE"
            echo "::notice::SINCE を手動上書き（バックフィル）: $SINCE"
          else
            LAST=$(gh run list --workflow=update-glossary.yml --status success --limit 1 --json createdAt --jq '.[0].createdAt // empty' 2>/dev/null || true)
            if [ -z "$LAST" ]; then SINCE="$CAP"; else SINCE="$LAST"; fi
          fi
          if [[ "$SINCE" < "$CAP" ]]; then
            echo "::warning::増分起点 $SINCE が14日上限より古いため $CAP に丸めます（未処理分はsince入力で個別バックフィルを）"
            SINCE="$CAP"
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "増分起点 SINCE=$SINCE"

      - name: 用語集自動更新（Claude / Bedrock）
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6 # 東京・日本国内推論（Bedrockで該当モデルのアクセス有効化が必要）
          SINCE: ${{ steps.win.outputs.since }} # 増分起点（前回成功以降）。スキルの git log --since に渡す
        run: |
          PROMPT=$(cat <<'EOF'
          .cortex-engine/plugin/skills/update-glossary-auto/SKILL.md の指示に従い、
          前回実行以降に追加・更新されたコンテキストから案件固有の新規用語を抽出し、
          Cortex/用語集/records/ に1用語1ファイルで追加してください。

          注意:
          - 増分方式です。環境変数 SINCE 以降（前回成功以降）のgit差分のみを対象にしてください。git log は --since="$SINCE" を使うこと（SINCEが空なら約25時間がデフォルト）。
          - Backlog同期は既にワークフロー側で実行済みなのでスキップしてください。
          - 新規用語の status は必ず draft にしてください（AI生成・人間未確認の印。人間がレビューして active に変えます）。
          - Cortex/用語集/README.md の「除外用語」セクションにある語は提案しないでください。
          - 新規追加と既存用語へのsynonyms追記のみを行い、既存の定義本文は書き換えないでください。
          - .cortex-engine/ 配下（エンジン）は抽出源から除外し、変更・コミットもしないでください。
          - 変更があれば git commit までを行ってください（push は行わない）。
          - 新規候補が無ければ何もコミットせず終了してください（毎晩走るため、これは通常の状態です）。
          EOF
          )
          # 無人実行（ephemeralなCIランナー）のため権限確認はスキップする
          claude -p "$PROMPT" --max-turns 60 --dangerously-skip-permissions

      # 生成物がオントロジー規約に違反している場合、ここで止める（壊れたコミットをpushしない）
      - name: Cortexのスキーマ検証
        run: node .cortex-engine/plugin/scripts/validate-cortex.mjs

      - name: Push（競合時はrebaseで再試行）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -z "$(git log origin/${GITHUB_REF_NAME}..HEAD --oneline 2>/dev/null)" ]; then
            echo "提案なし。pushをスキップ"
            exit 0
          fi
          for i in 1 2 3; do
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              echo "push成功"
              exit 0
            fi
            echo "push失敗。rebaseして再試行（$i/3）"
            git pull --rebase origin ${GITHUB_REF_NAME}
          done
          echo "pushに3回失敗しました"
          exit 1
