name: デザイン育成ノート自動更新
# 実体はエンジン。※ファイル名を変えないこと（増分起点SINCEの算出が gh run list --workflow=このファイル名 に依存）
# デザイン画面の育成ノート（Gold層）を夜間に自動更新する。update-gold とは独立（画像モダリティ・別ソース）
on:
  schedule:
    # 毎日 夜22:30 JST（UTC 13:30）。update-gold（22:00）の30分後。
    # 実体の job は同じ concurrency group（cortex-repo-write-*）なので、被っても自動で直列化される。
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "増分起点をISO8601で上書き（バックフィル用。空なら前回成功以降）"
        required: false
        default: ""
concurrency:
  group: update-design-notes
  cancel-in-progress: false
permissions:
  contents: write
  id-token: write # AWS OIDC 認証に必須
  actions: read   # SINCE算出（gh run list）に必要
jobs:
  update:
    uses: classmethod-team-app/cortex-engine/.github/workflows/update-design-notes.yml@v1
    secrets: inherit
    with:
      since: ${{ github.event.inputs.since || '' }}
