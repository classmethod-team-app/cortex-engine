name: 用語集自動更新
# 実体はエンジン。※ファイル名を変えないこと（増分起点SINCEの算出が gh run list --workflow=このファイル名 に依存）
on:
  schedule:
    # 毎日 夜22:30 JST（UTC 13:30）。Decision Log自動更新（22:00）の後
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "増分起点をISO8601で上書き（バックフィル用。空なら前回成功以降）"
        required: false
        default: ""
concurrency:
  group: update-glossary
  cancel-in-progress: false
permissions:
  contents: write
  id-token: write
  actions: read
jobs:
  update:
    uses: classmethod-team-app/cortex-engine/.github/workflows/update-glossary.yml@v1
    secrets: inherit
    with:
      since: ${{ github.event.inputs.since || '' }}
